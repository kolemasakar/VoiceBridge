name: Fix Milestone 6 strict test

on:
  push:
    branches:
      - agent/milestone-6-tts-playback

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
        with:
          ref: agent/milestone-6-tts-playback
          fetch-depth: 0
      - name: Fix strict test cast
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('src/cloud/tests/tts.test.ts')
          text = path.read_text(encoding='utf-8')
          old = '  const sentBody = requestBody as Record<string, any>;'
          new = '  const sentBody = requestBody as unknown as Record<string, any>;'
          if text.count(old) != 1:
              raise SystemExit('Expected strict cast marker was not found exactly once.')
          path.write_text(text.replace(old, new), encoding='utf-8', newline='\n')
          Path('.github/workflows/fix-milestone-6-test.yml').unlink()
          PY
      - name: Commit fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Fix Milestone 6 strict TTS test cast"
          git push origin HEAD:agent/milestone-6-tts-playback
