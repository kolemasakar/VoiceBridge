name: Run Milestone 6 code patch

on:
  push:
    branches:
      - agent/milestone-6-queue-and-rate-limit-fix

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
        with:
          ref: agent/milestone-6-queue-and-rate-limit-fix
          fetch-depth: 0

      - name: Apply and commit patch
        run: |
          changed=0
          if [ -f tools/apply_m6_queue_fix.py ]; then
            python3 tools/apply_m6_queue_fix.py
            changed=1
          fi
          if [ -f tools/fix_m6_batch_separator.py ]; then
            python3 tools/fix_m6_batch_separator.py
            changed=1
          fi
          if [ -f tools/fix_m6_test_timeout.py ]; then
            python3 tools/fix_m6_test_timeout.py
            changed=1
          fi
          if [ "$changed" -eq 1 ]; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add src docs tools
            git commit -m "Fix Milestone 6 queue stabilization tests"
            git push origin HEAD:agent/milestone-6-queue-and-rate-limit-fix
          else
            echo "Patch already applied."
          fi

      - name: Validate cloud
        working-directory: src/cloud
        run: |
          set +e
          npm ci > m6-validation.log 2>&1
          status=$?
          if [ $status -eq 0 ]; then
            npm run check >> m6-validation.log 2>&1
            status=$?
          fi
          cat m6-validation.log
          exit $status

      - name: Upload cloud validation log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: m6-cloud-validation-log
          path: src/cloud/m6-validation.log
          if-no-files-found: error

      - name: Validate extension
        run: |
          node --check src/browser_extension/audio_processor.js
          node --check src/browser_extension/offscreen.js
          node --check src/browser_extension/popup.js
          node --check src/browser_extension/service_worker.js
          node -e "JSON.parse(require('fs').readFileSync('src/browser_extension/manifest.json', 'utf8'))"

      - name: Validate ASCII Markdown
        run: |
          python3 - <<'PY'
          from pathlib import Path
          failures = []
          for path in Path('.').rglob('*.md'):
              try:
                  path.read_text(encoding='ascii')
              except UnicodeDecodeError:
                  failures.append(str(path))
          if failures:
              raise SystemExit('Non-ASCII Markdown: ' + ', '.join(failures))
          print('ASCII Markdown validation passed')
          PY
