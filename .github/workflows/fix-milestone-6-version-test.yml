name: Fix Milestone 6 version test

on:
  push:
    branches:
      - agent/milestone-6-tts-playback

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
        with:
          ref: agent/milestone-6-tts-playback
          fetch-depth: 0
      - name: Update service version assertion
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('src/cloud/tests/cloud.test.ts')
          text = path.read_text(encoding='utf-8')
          old = 'test("health reports cloud 0.4.2 and translation capability", async () => {'
          new = 'test("health reports cloud 0.5.0 and pipeline capabilities", async () => {'
          if text.count(old) != 1:
              raise SystemExit('Health test title marker was not found exactly once.')
          text = text.replace(old, new)
          old_version = '  assert.equal(body.version, "0.4.2");'
          new_version = '  assert.equal(body.version, "0.5.0");'
          if text.count(old_version) != 1:
              raise SystemExit('Health version marker was not found exactly once.')
          path.write_text(
              text.replace(old_version, new_version),
              encoding='utf-8',
              newline='\n'
          )
          Path('.github/workflows/fix-milestone-6-version-test.yml').unlink()
          PY
      - name: Commit fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Update cloud 0.5.0 health assertion"
          git push origin HEAD:agent/milestone-6-tts-playback
