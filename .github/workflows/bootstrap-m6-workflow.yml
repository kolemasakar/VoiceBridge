name: Bootstrap Milestone 6 patch workflow

on:
  push:
    branches:
      - agent/milestone-6-queue-and-rate-limit-fix

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
        with:
          ref: agent/milestone-6-queue-and-rate-limit-fix
      - name: Enable patch workflow
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/apply-milestone-6-queue-fix.yml')
          text = path.read_text(encoding='utf-8')
          marker = "    if: github.actor != 'github-actions[bot]'\n"
          if marker not in text:
              raise SystemExit('Patch workflow condition marker not found')
          path.write_text(text.replace(marker, '', 1), encoding='utf-8', newline='\n')
          Path('.github/workflows/bootstrap-m6-workflow.yml').unlink()
          PY
      - name: Commit workflow bootstrap
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Enable Milestone 6 patch workflow"
          git push origin HEAD:agent/milestone-6-queue-and-rate-limit-fix
