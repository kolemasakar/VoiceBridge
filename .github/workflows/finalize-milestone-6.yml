name: Finalize Milestone 6 fixes

on:
  push:
    branches:
      - agent/milestone-6-tts-playback

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
        with:
          ref: agent/milestone-6-tts-playback
          fetch-depth: 0
      - name: Apply deterministic fixes
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          def replace_optional(path, old, new):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              if old in text:
                  p.write_text(text.replace(old, new), encoding='utf-8', newline='\n')

          replace_optional(
              'src/cloud/src/tts_provider.ts',
              '  model: string,\n  voice: string\n): TtsProvider {',
              '  model = "gemini-2.5-flash-preview-tts",\n'
              '  voice = "Iapetus"\n): TtsProvider {'
          )
          replace_optional(
              'src/cloud/src/stream_transport.ts',
              '  ttsProvider: TtsProvider,\n  ttsVoice: string\n): void {',
              '  ttsProvider: TtsProvider,\n  ttsVoice = "Iapetus"\n): void {'
          )

          lock_path = Path('src/cloud/package-lock.json')
          lock = json.loads(lock_path.read_text(encoding='utf-8'))
          lock['version'] = '0.5.0'
          lock['packages']['']['version'] = '0.5.0'
          lock_path.write_text(json.dumps(lock, indent=2) + '\n', encoding='utf-8')

          test_path = Path('src/cloud/tests/tts.test.ts')
          tests = test_path.read_text(encoding='utf-8')
          tests = tests.replace(
              'async function createAndOpenStream(\n  baseUrl: string\n): Promise<WebSocket> {',
              'async function createAndOpenStream(\n  baseUrl: string,\n'
              '  expectedTtsProvider = "fake-tts"\n): Promise<WebSocket> {'
          )
          tests = tests.replace(
              '  const [ready] = await readyPromise;\n'
              '  assert.equal(ready.data.tts_provider, "fake-tts");',
              '  const ready = (await readyPromise)[0]!;\n'
              '  assert.equal(ready.data.tts_provider, expectedTtsProvider);'
          )
          tests = tests.replace(
              '    const socket = await createAndOpenStream(running.baseUrl);\n'
              '    const translationPromise = nextEvents(socket, "TRANSLATION_FINAL");\n'
              '    const errorPromise = nextEvents(socket, "TTS_ERROR");',
              '    const socket = await createAndOpenStream(\n'
              '      running.baseUrl,\n'
              '      "failing-tts"\n'
              '    );\n'
              '    const translationPromise = nextEvents(socket, "TRANSLATION_FINAL");\n'
              '    const errorPromise = nextEvents(socket, "TTS_ERROR");'
          )
          tests = tests.replace(
              '  assert.equal(requestBody?.generationConfig?.responseModalities?.[0], "AUDIO");\n'
              '  assert.equal(\n'
              '    requestBody?.generationConfig?.speechConfig?.voiceConfig\n'
              '      ?.prebuiltVoiceConfig?.voiceName,\n'
              '    "Iapetus"\n'
              '  );',
              '  const sentBody = requestBody as Record<string, any>;\n'
              '  assert.equal(sentBody.generationConfig.responseModalities[0], "AUDIO");\n'
              '  assert.equal(\n'
              '    sentBody.generationConfig.speechConfig.voiceConfig\n'
              '      .prebuiltVoiceConfig.voiceName,\n'
              '    "Iapetus"\n'
              '  );'
          )
          tests = tests.replace('const [translation] = await translationPromise;', 'const translation = (await translationPromise)[0]!;')
          tests = tests.replace('const [audioStart] = await startPromise;', 'const audioStart = (await startPromise)[0]!;')
          tests = tests.replace('const [audioEnd] = await endPromise;', 'const audioEnd = (await endPromise)[0]!;')
          tests = tests.replace('const [error] = await errorPromise;', 'const error = (await errorPromise)[0]!;')
          tests = tests.replace('const [completed] = await completedPromise;', 'const completed = (await completedPromise)[0]!;')
          tests = tests.replace('chunks[0].data.chunk_index', 'chunks[0]!.data.chunk_index')
          tests = tests.replace('chunks[1].data.chunk_index', 'chunks[1]!.data.chunk_index')
          test_path.write_text(tests, encoding='utf-8', newline='\n')
          PY

          git show origin/main:.github/workflows/validate.yml > .github/workflows/validate.yml
          sed -i 's/0\.5\.0/0.6.0/g' .github/workflows/validate.yml
          rm -f .github/workflows/finalize-milestone-6.yml
      - name: Commit fixes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Finalize Milestone 6 strict validation fixes"
          git push origin HEAD:agent/milestone-6-tts-playback
