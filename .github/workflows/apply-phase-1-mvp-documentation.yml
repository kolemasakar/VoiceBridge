name: Apply Phase 1 MVP Documentation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
        with:
          ref: ${{ github.head_ref }}
      - name: Apply documentation synchronization
        run: python3 tools/apply_phase1_mvp_documentation.py
      - name: Validate ASCII Markdown
        run: |
          python3 - <<'PY'
          from pathlib import Path
          failures = []
          for path in Path('.').rglob('*.md'):
              try:
                  path.read_text(encoding='ascii')
              except UnicodeDecodeError:
                  failures.append(str(path))
          if failures:
              raise SystemExit('Non-ASCII Markdown: ' + ', '.join(failures))
          print('ASCII Markdown validation passed')
          PY
      - name: Commit synchronized documentation
        run: |
          if git diff --quiet; then
            echo "Documentation already synchronized."
            exit 0
          fi
          git config user.name "VoiceBridge Automation"
          git config user.email "actions@users.noreply.github.com"
          git add README.md docs
          git commit -m "SYNCHRONIZE_PHASE_1_MVP_DOCUMENTATION"
          git push origin HEAD:${{ github.head_ref }}
