name: Apply Azure TTS provider

on:
  push:
    branches:
      - agent/azure-tts-provider

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
        with:
          ref: agent/azure-tts-provider
          fetch-depth: 0

      - name: Apply Azure provider integration
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one occurrence, found {count}: {old!r}')
              p.write_text(text.replace(old, new), encoding='utf-8', newline='\n')

          server = Path('src/cloud/src/server.ts')
          text = server.read_text(encoding='utf-8')
          text = text.replace('const SERVICE_VERSION = "0.5.1";', 'const SERVICE_VERSION = "0.5.2";')
          old_factory = '''  ttsProvider: TtsProvider = createTtsProvider(
    config.geminiApiKey,
    config.geminiTtsModel,
    config.geminiTtsVoice
  )'''
          new_factory = '''  ttsProvider: TtsProvider = createTtsProvider({
    provider: config.ttsProvider,
    geminiApiKey: config.geminiApiKey,
    geminiModel: config.geminiTtsModel,
    geminiVoice: config.geminiTtsVoice,
    azureSpeechKey: config.azureSpeechKey,
    azureSpeechRegion: config.azureSpeechRegion,
    azureVoice: config.azureTtsVoice
  })'''
          if old_factory not in text:
              raise SystemExit('server.ts: old TTS factory block not found')
          text = text.replace(old_factory, new_factory)
          marker = '''  const streamTickets = new StreamTicketStore();

  const server = createServer(async (request, response) => {'''
          replacement = '''  const streamTickets = new StreamTicketStore();
  const selectedTtsVoice = ttsProvider.name === "azure"
    ? config.azureTtsVoice || "uk-UA-OstapNeural"
    : config.geminiTtsVoice || "Iapetus";
  const selectedTtsModel = ttsProvider.name === "azure"
    ? null
    : config.geminiTtsModel || "gemini-2.5-flash-preview-tts";
  const selectedTtsRegion = ttsProvider.name === "azure"
    ? config.azureSpeechRegion || "eastus"
    : null;

  const server = createServer(async (request, response) => {'''
          if marker not in text:
              raise SystemExit('server.ts: stream ticket marker not found')
          text = text.replace(marker, replacement)
          old_health = '''            tts: {
              provider: ttsProvider.name,
              configured: ttsProvider.configured,
              model: config.geminiTtsModel,
              voice: config.geminiTtsVoice,
              audio_format: "pcm_s16le",
              sample_rate_hz: 24000,
              channels: 1
            }'''
          new_health = '''            tts: {
              provider: ttsProvider.name,
              configured: ttsProvider.configured,
              model: selectedTtsModel,
              voice: selectedTtsVoice,
              region: selectedTtsRegion,
              audio_format: "pcm_s16le",
              sample_rate_hz: 24000,
              channels: 1
            }'''
          if old_health not in text:
              raise SystemExit('server.ts: old health TTS block not found')
          text = text.replace(old_health, new_health)
          text = text.replace(
              '    ttsProvider,\n    config.geminiTtsVoice\n  );',
              '    ttsProvider,\n    selectedTtsVoice\n  );'
          )
          server.write_text(text, encoding='utf-8', newline='\n')

          env = Path('src/cloud/.env.example')
          env_text = env.read_text(encoding='utf-8')
          env_text = env_text.replace(
              'GEMINI_TTS_MODEL=gemini-2.5-flash-preview-tts\nGEMINI_TTS_VOICE=Iapetus',
              'TTS_PROVIDER=gemini\nGEMINI_TTS_MODEL=gemini-2.5-flash-preview-tts\nGEMINI_TTS_VOICE=Iapetus\nAZURE_SPEECH_KEY=\nAZURE_SPEECH_REGION=eastus\nAZURE_TTS_VOICE=uk-UA-OstapNeural'
          )
          env.write_text(env_text, encoding='ascii', newline='\n')

          for file_name in ['src/cloud/package.json', 'src/cloud/package-lock.json']:
              path = Path(file_name)
              data = json.loads(path.read_text(encoding='utf-8'))
              data['version'] = '0.5.2'
              if file_name.endswith('package-lock.json'):
                  data['packages']['']['version'] = '0.5.2'
              path.write_text(json.dumps(data, indent=2) + '\n', encoding='utf-8')

          cloud_test = Path('src/cloud/tests/cloud.test.ts')
          cloud_text = cloud_test.read_text(encoding='utf-8')
          cloud_text = cloud_text.replace(
              'health reports cloud 0.5.1 and pipeline capabilities',
              'health reports cloud 0.5.2 and pipeline capabilities'
          )
          cloud_text = cloud_text.replace('body.version, "0.5.1"', 'body.version, "0.5.2"')
          cloud_test.write_text(cloud_text, encoding='utf-8', newline='\n')

          tts_test = Path('src/cloud/tests/tts.test.ts')
          tts_text = tts_test.read_text(encoding='utf-8')
          tts_text = tts_text.replace(
              '  GeminiTtsProvider,\n  TtsProviderError',
              '  AzureTtsProvider,\n  GeminiTtsProvider,\n  TtsProviderError'
          )
          old_config_test = '''test("configuration exposes Gemini TTS defaults", () => {
  const config = loadConfig({ TEST_ACCESS_TOKEN: TOKEN });
  assert.equal(config.geminiTtsModel, "gemini-2.5-flash-preview-tts");
  assert.equal(config.geminiTtsVoice, "Iapetus");
  assert.throws(
    () => loadConfig({
      TEST_ACCESS_TOKEN: TOKEN,
      GEMINI_TTS_VOICE: "invalid voice"
    }),
    /GEMINI_TTS_VOICE/
  );
});'''
          new_config_test = '''test("configuration exposes selectable TTS provider defaults", () => {
  const config = loadConfig({ TEST_ACCESS_TOKEN: TOKEN });
  assert.equal(config.ttsProvider, "gemini");
  assert.equal(config.geminiTtsModel, "gemini-2.5-flash-preview-tts");
  assert.equal(config.geminiTtsVoice, "Iapetus");
  assert.equal(config.azureSpeechKey, null);
  assert.equal(config.azureSpeechRegion, "eastus");
  assert.equal(config.azureTtsVoice, "uk-UA-OstapNeural");

  const azure = loadConfig({
    TEST_ACCESS_TOKEN: TOKEN,
    TTS_PROVIDER: "azure",
    AZURE_SPEECH_KEY: "azure-test-key",
    AZURE_SPEECH_REGION: "EASTUS",
    AZURE_TTS_VOICE: "uk-UA-PolinaNeural"
  });
  assert.equal(azure.ttsProvider, "azure");
  assert.equal(azure.azureSpeechKey, "azure-test-key");
  assert.equal(azure.azureSpeechRegion, "eastus");
  assert.equal(azure.azureTtsVoice, "uk-UA-PolinaNeural");

  assert.throws(
    () => loadConfig({
      TEST_ACCESS_TOKEN: TOKEN,
      TTS_PROVIDER: "unsupported"
    }),
    /TTS_PROVIDER/
  );
});'''
          if old_config_test not in tts_text:
              raise SystemExit('tts.test.ts: config test block not found')
          tts_text = tts_text.replace(old_config_test, new_config_test)
          azure_test = '''

test("Azure TTS adapter sends SSML and normalizes raw PCM", async () => {
  let requestedUrl = "";
  let requestedHeaders = new Headers();
  let requestedBody = "";
  const pcm = Buffer.alloc(48000);
  const provider = new AzureTtsProvider(
    "azure-test-key",
    "eastus",
    "uk-UA-OstapNeural",
    "https://eastus.tts.test/cognitiveservices/v1",
    async (input, init) => {
      requestedUrl = String(input);
      requestedHeaders = new Headers(init?.headers);
      requestedBody = String(init?.body);
      return new Response(pcm, {
        status: 200,
        headers: { "content-type": "audio/basic" }
      });
    },
    1000
  );

  const request = ttsRequest();
  request.text = "Pryvit & svite.";
  request.voice = "uk-UA-OstapNeural";
  const result = await provider.synthesize(request);

  assert.equal(requestedUrl, "https://eastus.tts.test/cognitiveservices/v1");
  assert.equal(
    requestedHeaders.get("Ocp-Apim-Subscription-Key"),
    "azure-test-key"
  );
  assert.equal(
    requestedHeaders.get("X-Microsoft-OutputFormat"),
    "raw-24khz-16bit-mono-pcm"
  );
  assert.equal(requestedHeaders.get("User-Agent"), "VoiceBridge");
  assert.match(requestedBody, /xml:lang="uk-UA"/);
  assert.match(requestedBody, /name="uk-UA-OstapNeural"/);
  assert.match(requestedBody, /Pryvit &amp; svite\./);
  assert.equal(result.provider, "azure");
  assert.equal(result.voice, "uk-UA-OstapNeural");
  assert.equal(result.audioFormat, "pcm_s16le");
  assert.equal(result.sampleRateHz, 24000);
  assert.equal(result.audio.byteLength, 48000);
  assert.equal(result.audioDurationMs, 1000);
});

test("Azure TTS adapter maps quota response with Retry-After", async () => {
  const provider = new AzureTtsProvider(
    "azure-test-key",
    "eastus",
    "uk-UA-OstapNeural",
    "https://eastus.tts.test/cognitiveservices/v1",
    async () => new Response("", {
      status: 429,
      headers: { "retry-after": "7" }
    }),
    1000
  );

  await assert.rejects(
    provider.synthesize({ ...ttsRequest(), voice: "uk-UA-OstapNeural" }),
    (error: unknown) =>
      error instanceof TtsProviderError &&
      error.code === "TTS_RATE_LIMITED" &&
      error.retryable === true &&
      error.retryAfterMs === 7000
  );
});
'''
          insertion = 'test("ordered translation produces bounded TTS audio events", async () => {'
          if insertion not in tts_text:
              raise SystemExit('tts.test.ts: ordered TTS test marker not found')
          tts_text = tts_text.replace(insertion, azure_test + '\n' + insertion)
          tts_test.write_text(tts_text, encoding='utf-8', newline='\n')

          readme = Path('README.md')
          readme_text = readme.read_text(encoding='utf-8')
