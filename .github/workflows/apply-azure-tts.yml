          )
          cr = cr.replace('Version:\n0.5.0', 'Version:\n0.5.2')
          cr = cr.replace('- ordered Gemini Ukrainian speech synthesis;', '- ordered Azure Speech or Gemini Ukrainian speech synthesis;')
          old_cfg = '''Required for live Gemini translation and TTS:

```text
GEMINI_API_KEY
```

Optional model and voice overrides:

```text
GEMINI_TRANSLATION_MODEL=gemini-3.1-flash-lite
GEMINI_TTS_MODEL=gemini-2.5-flash-preview-tts
GEMINI_TTS_VOICE=Iapetus
```'''
          new_cfg = '''Required for live Gemini translation:

```text
GEMINI_API_KEY
```

Select the cloud TTS provider:

