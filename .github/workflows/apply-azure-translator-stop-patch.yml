name: Apply Azure Translator and Stop State

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
        with:
          ref: ${{ github.head_ref }}
      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: src/cloud/package-lock.json
      - name: Apply patch
        run: python3 tools/apply_azure_translator_stop_patch.py
      - name: Validate cloud
        working-directory: src/cloud
        run: |
          npm ci
          npm run check
      - name: Validate extension JavaScript
        run: |
          node --check src/browser_extension/offscreen.js
          node --check src/browser_extension/popup.js
          node --check src/browser_extension/service_worker.js
          node -e "const m=require('./src/browser_extension/manifest.json'); if(m.version!=='0.6.2') process.exit(1)"
      - name: Validate ASCII Markdown
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import subprocess
          paths = subprocess.check_output(
              ["git", "ls-files", "*.md"], text=True
          ).splitlines()
          bad=[]
          for value in paths:
              path = Path(value)
              try:
                  path.read_text(encoding='ascii')
              except UnicodeDecodeError:
                  bad.append(str(path))
          if bad:
              raise SystemExit('Non-ASCII Markdown: ' + ', '.join(bad))
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then
            echo "No patch changes to commit."
            exit 0
          fi
          git config user.name "VoiceBridge Automation"
          git config user.email "actions@users.noreply.github.com"
          git add .
          git commit -m "ADD_AZURE_TRANSLATOR_AND_IDEMPOTENT_STOP_STATE"
          git push origin HEAD:${{ github.head_ref }}
