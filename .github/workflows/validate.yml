name: Validate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize-azure-tts:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/azure-tts-provider' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Azure TTS branch
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
        with:
          ref: agent/azure-tts-provider
          fetch-depth: 0

      - name: Finalize versions tests and documentation
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          cloud_test = Path('src/cloud/tests/cloud.test.ts')
          text = cloud_test.read_text(encoding='utf-8')
          text = text.replace(
              'health reports cloud 0.5.1 and pipeline capabilities',
              'health reports cloud 0.5.2 and pipeline capabilities'
          )
          text = text.replace('body.version, "0.5.1"', 'body.version, "0.5.2"')
          cloud_test.write_text(text, encoding='utf-8', newline='\n')

          lock_path = Path('src/cloud/package-lock.json')
          lock = json.loads(lock_path.read_text(encoding='utf-8'))
          lock['version'] = '0.5.2'
          lock['packages']['']['version'] = '0.5.2'
          lock_path.write_text(json.dumps(lock, indent=2) + '\n', encoding='utf-8')

          readme = Path('README.md')
          text = readme.read_text(encoding='utf-8')
          text = text.replace('cloud service `0.5.0`', 'cloud service `0.5.2`')
          text = text.replace('-> Gemini Ukrainian TTS', '-> Azure Speech Ukrainian TTS')
          text = text.replace(
              '- [TTS Provider ADR](docs/adr/ADR-007_PHASE_1_TTS_PROVIDER.md)',
              '- [Initial TTS Provider ADR](docs/adr/ADR-007_PHASE_1_TTS_PROVIDER.md)\n- [Azure TTS Provider ADR](docs/adr/ADR-008_AZURE_TTS_PROVIDER.md)'
          )
          readme.write_text(text, encoding='ascii', newline='\n')

          cloud_readme = Path('src/cloud/README.md')
          text = cloud_readme.read_text(encoding='utf-8')
          text = text.replace(
              'Gemini English-to-Ukrainian translation, and Gemini Ukrainian TTS.',
              'Gemini English-to-Ukrainian translation, and selectable Azure or Gemini Ukrainian TTS.'
          )
          text = text.replace('Version:\n0.5.0', 'Version:\n0.5.2')
          text = text.replace(
              '- ordered Gemini Ukrainian speech synthesis;',
              '- ordered Azure Speech or Gemini Ukrainian speech synthesis;'
          )
          old = '''Required for live Gemini translation and TTS:

```text
GEMINI_API_KEY
```

Optional model and voice overrides:

```text
GEMINI_TRANSLATION_MODEL=gemini-3.1-flash-lite
GEMINI_TTS_MODEL=gemini-2.5-flash-preview-tts
GEMINI_TTS_VOICE=Iapetus
```'''
          new = '''Required for live Gemini translation:

```text
GEMINI_API_KEY
```

Select the cloud TTS provider:

```text
TTS_PROVIDER=azure
```

Required for Azure Speech TTS:

```text
AZURE_SPEECH_KEY
AZURE_SPEECH_REGION=eastus
AZURE_TTS_VOICE=uk-UA-OstapNeural
```

Gemini TTS remains available as a selectable fallback:

```text
TTS_PROVIDER=gemini
GEMINI_TTS_MODEL=gemini-2.5-flash-preview-tts
GEMINI_TTS_VOICE=Iapetus
```

Translation model override:

```text
GEMINI_TRANSLATION_MODEL=gemini-3.1-flash-lite
```'''
          if old not in text:
              raise SystemExit('Cloud README configuration block not found')
          text = text.replace(old, new)
          text = text.replace('"synthesis": "gemini"', '"synthesis": "azure"')
          text = text.replace('"voice_id": "Iapetus"', '"voice_id": "uk-UA-OstapNeural"')
          text = text.replace(
              'The controlled Gemini free-tier test is limited to public YouTube or synthetic content approved for provider processing.\n\nIt MUST NOT process private, confidential, regulated, or production content.',
              'Azure Speech and Gemini translation are used only for controlled public YouTube or synthetic content approved for provider processing.\n\nPrivate, confidential, regulated, or production content remains prohibited during Phase 1 testing.'
          )
          text = text.replace(
              '- one implemented provider per pipeline stage;',
              '- Azure Speech and Gemini TTS adapters are selectable;'
          )
          text = text.replace('- Gemini TTS is a preview model;\n', '')
          text = text.replace(
              '- no automatic provider retry or fallback;',
              '- retry and backoff are bounded; automatic cross-provider fallback is disabled;'
          )
          cloud_readme.write_text(text, encoding='ascii', newline='\n')

          adr7 = Path('docs/adr/ADR-007_PHASE_1_TTS_PROVIDER.md')
          text = adr7.read_text(encoding='utf-8')
          text = text.replace('Status: ACCEPTED', 'Status: SUPERSEDED')
          text = text.replace(
              '## Context',
              'Superseded by `ADR-008_AZURE_TTS_PROVIDER.md` after live Gemini TTS quota exhaustion.\n\n## Context'
          )
          adr7.write_text(text, encoding='ascii', newline='\n')

          Path('docs/adr/ADR-008_AZURE_TTS_PROVIDER.md').write_text('''# ADR-008 Azure Speech TTS Provider

Status: ACCEPTED

Date: 2026-07-21

Decision Owners: VoiceBridge project

## Context

Milestone 6 live testing proved browser PCM playback and ducking, but Gemini preview TTS exhausted provider quota during continuous sessions. Translation completed while TTS stopped after a small number of segments, even with bounded batching, retry, and backoff.

VoiceBridge requires a stable Ukrainian neural TTS service with predictable request behavior and a controlled free test allowance.

## Decision

Use Azure Speech as the primary Phase 1 TTS provider.

Initial configuration:

- provider selector: `TTS_PROVIDER=azure`;
- region: `AZURE_SPEECH_REGION=eastus`;
- voice: `AZURE_TTS_VOICE=uk-UA-OstapNeural`;
- credential: `AZURE_SPEECH_KEY`;
- output: `raw-24khz-16bit-mono-pcm`;
- endpoint: regional Azure Speech REST text-to-speech endpoint.

Gemini TTS remains implemented as a selectable fallback adapter but is not the active continuous-test provider.

## Rationale

- Azure Speech provides native Ukrainian neural voices `uk-UA-OstapNeural` and `uk-UA-PolinaNeural`;
- raw mono 24000 Hz 16-bit PCM matches the existing browser playback pipeline;
- the Azure resource is deployed in East US near the Render Virginia service;
- the provider uses a separate revocable cloud-only credential;
- the existing provider-neutral TTS contract and browser extension require no protocol change;
- the free F0 resource is suitable for controlled validation without automatic cross-provider fallback.

## Security

- `AZURE_SPEECH_KEY` MUST remain only in Render environment variables;
- the key MUST NOT be committed, logged, sent to the browser, or shown in screenshots;
- provider errors MUST remain sanitized;
- synthesized PCM MUST remain transient and must not be persisted.

## Runtime Contract

Azure output is normalized to:

- provider: `azure`;
- audio format: `pcm_s16le`;
- sample rate: `24000` Hz;
- channels: `1`;
- bounded PCM bytes and duration metadata;
- existing ordered `TTS_AUDIO_START`, `TTS_AUDIO_CHUNK`, and `TTS_AUDIO_END` events.

## Failure Policy

- HTTP 429 maps to `TTS_RATE_LIMITED` and honors `Retry-After`;
- temporary HTTP 5xx responses are retryable;
- authorization and validation failures are sanitized as provider rejection;
- TTS failure does not terminate audio capture, STT, or translation;
- automatic cross-provider fallback is disabled to keep behavior deterministic.

## Validation

The Azure integration must pass:

- configuration validation;
- SSML construction and XML escaping;
- subscription-key header validation;
- raw PCM normalization;
- Retry-After mapping;
- existing ordered browser audio events;
- a continuous live public YouTube test with sustained Ukrainian speech;
- clean bounded shutdown and zero secret exposure.

## References

- https://learn.microsoft.com/azure/ai-services/speech-service/rest-text-to-speech
- https://learn.microsoft.com/azure/ai-services/speech-service/language-support
- [ADR-007_PHASE_1_TTS_PROVIDER](ADR-007_PHASE_1_TTS_PROVIDER.md)
- [PHASE_1_MILESTONE_6_TTS_PLAYBACK](../phases/PHASE_1_MILESTONE_6_TTS_PLAYBACK.md)

## Version History

| Version | Date | Description |
|---------|------|-------------|
| 1.0.0 | 2026-07-21 | Selected Azure Speech as primary Phase 1 Ukrainian TTS provider |
''', encoding='ascii', newline='\n')

          phase = Path('docs/phases/PHASE_1_MILESTONE_6_TTS_PLAYBACK.md')
          text = phase.read_text(encoding='utf-8')
          text = text.replace(
              '''- provider: Gemini Developer API;
- model: `gemini-2.5-flash-preview-tts`;
- default voice: `Iapetus`;
- credential: existing cloud-only `GEMINI_API_KEY`;
- optional configuration: `GEMINI_TTS_MODEL` and `GEMINI_TTS_VOICE`.''',
              '''- primary provider: Azure Speech;
- default voice: `uk-UA-OstapNeural`;
- region: `eastus`;
- credential: cloud-only `AZURE_SPEECH_KEY`;
- provider selector: `TTS_PROVIDER=azure`;
- Gemini TTS remains available as a non-active fallback adapter.'''
          )
          text = text.replace(
              '`docs/adr/ADR-007_PHASE_1_TTS_PROVIDER.md`',
              '`docs/adr/ADR-008_AZURE_TTS_PROVIDER.md`'
          )
          text = text.replace('Gemini Ukrainian PCM synthesis', 'Azure Speech Ukrainian PCM synthesis')
          text = text.replace('## Cloud Service 0.5.0', '## Cloud Service 0.5.2')
          text = text.replace(
              '- Gemini TTS REST adapter;',
              '- Azure Speech REST TTS adapter and selectable Gemini fallback adapter;'
          )
          text = text.replace(
              '- configurable model and voice;',
              '- configurable provider, Azure region, and voice;'
          )
          text = text.replace(
              '- maximum 2 MiB provider audio response;',
              '- maximum 8 MiB provider audio response;'
          )
          text = text.replace(
              '- TTS configuration defaults and validation;',
              '- selectable Azure or Gemini TTS configuration and validation;'
          )
          text = text.replace(
              '- Gemini request construction;',
              '- Azure SSML request construction and Gemini request regression coverage;'
          )
          text = text.replace(
              '- base64 PCM response normalization;',
              '- raw Azure PCM and base64 Gemini PCM response normalization;'
          )
          text = text.replace(
              'The Gemini free tier is restricted to controlled public YouTube or synthetic test content approved for provider processing.',
              'Azure Speech and Gemini translation are restricted to controlled public YouTube or synthetic test content approved for provider processing.'
          )
          text = text.replace('cloud service `0.5.0`', 'cloud service `0.5.2`')
          text = text.replace('TTS provider is `gemini`', 'TTS provider is `azure`')
          text = text.replace(
              'voice is `Iapetus` unless an approved override is used',
              'voice is `uk-UA-OstapNeural` unless an approved override is used'
          )
          text = text.replace(
              '- [ADR-007_PHASE_1_TTS_PROVIDER](../adr/ADR-007_PHASE_1_TTS_PROVIDER.md)',
              '- [ADR-008_AZURE_TTS_PROVIDER](../adr/ADR-008_AZURE_TTS_PROVIDER.md)\n- [ADR-007_PHASE_1_TTS_PROVIDER](../adr/ADR-007_PHASE_1_TTS_PROVIDER.md)'
          )
          text = text.replace(
              '| 0.1.0 | 2026-07-21 | Implemented cloud TTS, browser PCM playback, automatic ducking, metrics, tests, and validation plan |',
              '| 0.2.0 | 2026-07-21 | Added Azure Speech provider after Gemini continuous-test quota exhaustion |\n| 0.1.0 | 2026-07-21 | Implemented cloud TTS, browser PCM playback, automatic ducking, metrics, tests, and validation plan |'
          )
          phase.write_text(text, encoding='ascii', newline='\n')

          Path('.github/workflows/apply-azure-tts.yml').unlink(missing_ok=True)
          PY

      - name: Restore standard validation workflow
        run: |
          git fetch origin main
          git checkout origin/main -- .github/workflows/validate.yml

      - name: Install dependencies
        working-directory: src/cloud
        run: npm ci

      - name: Build and test Azure TTS integration
        working-directory: src/cloud
        run: npm run check

      - name: Validate ASCII Markdown
        run: |
          python3 - <<'PY'
          from pathlib import Path
          failures = []
          for path in Path('.').rglob('*.md'):
              try:
                  path.read_text(encoding='ascii')
              except UnicodeDecodeError:
                  failures.append(str(path))
          if failures:
              raise SystemExit('Non-ASCII Markdown: ' + ', '.join(failures))
          print('ASCII Markdown validation passed')
          PY

      - name: Commit final Azure TTS integration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Finalize Azure Speech TTS integration"
          git push origin HEAD:agent/azure-tts-provider

  cloud:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/cloud
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: src/cloud/package-lock.json
      - name: Install cloud dependencies
        run: npm ci
      - name: Build and test cloud service
        run: |
          set +e
          npm run check > validation.log 2>&1
          status=$?
          cat validation.log
          exit $status
      - name: Upload cloud validation log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: cloud-validation-log
          path: src/cloud/validation.log
          if-no-files-found: error

  browser-extension:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: "24"
      - name: Validate browser JavaScript
        run: |
          node --check src/browser_extension/audio_processor.js
          node --check src/browser_extension/offscreen.js
          node --check src/browser_extension/popup.js
          node --check src/browser_extension/service_worker.js
      - name: Validate browser manifest
        run: node -e "JSON.parse(require('fs').readFileSync('src/browser_extension/manifest.json', 'utf8'))"
      - name: Package browser extension 0.6.1
        run: |
          rm -rf dist
          mkdir -p dist/extension
          cp src/browser_extension/audio_processor.js dist/extension/
          cp src/browser_extension/manifest.json dist/extension/
          cp src/browser_extension/offscreen.html dist/extension/
          cp src/browser_extension/offscreen.js dist/extension/
          cp src/browser_extension/popup.css dist/extension/
          cp src/browser_extension/popup.html dist/extension/
          cp src/browser_extension/popup.js dist/extension/
          cp src/browser_extension/service_worker.js dist/extension/
          cp src/browser_extension/README.md dist/extension/
          cd dist
          zip -r VoiceBridge_Extension_0.6.1.zip extension
          sha256sum VoiceBridge_Extension_0.6.1.zip > VoiceBridge_Extension_0.6.1_SHA256.txt
      - name: Upload browser extension 0.6.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: VoiceBridge_Extension_0.6.1
          path: |
            dist/VoiceBridge_Extension_0.6.1.zip
            dist/VoiceBridge_Extension_0.6.1_SHA256.txt
          if-no-files-found: error

  repository-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
      - name: Validate Markdown ASCII
        run: |
          python3 - <<'PY'
          from pathlib import Path
          failures = []
          for path in Path('.').rglob('*.md'):
              try:
                  path.read_text(encoding='ascii')
              except UnicodeDecodeError:
                  failures.append(str(path))
          if failures:
              raise SystemExit('Non-ASCII Markdown: ' + ', '.join(failures))
          print('ASCII Markdown validation passed')
          PY
