name: Validate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-milestone-6-fixes:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/milestone-6-tts-playback' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
        with:
          ref: agent/milestone-6-tts-playback
          fetch-depth: 0
      - name: Apply deterministic validation fixes
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          def replace_once(path, old, new):
              target = Path(path)
              text = target.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(
                      f'{path}: expected one occurrence, found {count}: {old!r}'
                  )
              target.write_text(
                  text.replace(old, new),
                  encoding='utf-8',
                  newline='\n'
              )

          replace_once(
              'src/cloud/src/tts_provider.ts',
              '  model: string,\n  voice: string\n): TtsProvider {',
              '  model = "gemini-2.5-flash-preview-tts",\n'
              '  voice = "Iapetus"\n): TtsProvider {'
          )
          replace_once(
              'src/cloud/src/stream_transport.ts',
              '  ttsProvider: TtsProvider,\n  ttsVoice: string\n): void {',
              '  ttsProvider: TtsProvider,\n  ttsVoice = "Iapetus"\n): void {'
          )

          lock_path = Path('src/cloud/package-lock.json')
          lock = json.loads(lock_path.read_text(encoding='utf-8'))
          lock['version'] = '0.5.0'
          lock['packages']['']['version'] = '0.5.0'
          lock_path.write_text(
              json.dumps(lock, indent=2) + '\n',
              encoding='utf-8'
          )

          test_path = Path('src/cloud/tests/tts.test.ts')
          tests = test_path.read_text(encoding='utf-8')
          tests = tests.replace(
              'async function createAndOpenStream(\n  baseUrl: string\n): Promise<WebSocket> {',
              'async function createAndOpenStream(\n'
              '  baseUrl: string,\n'
              '  expectedTtsProvider = "fake-tts"\n'
              '): Promise<WebSocket> {'
          )
          tests = tests.replace(
              '  const [ready] = await readyPromise;\n'
              '  assert.equal(ready.data.tts_provider, "fake-tts");',
              '  const ready = (await readyPromise)[0]!;\n'
              '  assert.equal(ready.data.tts_provider, expectedTtsProvider);'
          )
          tests = tests.replace(
              '    const socket = await createAndOpenStream(running.baseUrl);\n'
              '    const translationPromise = nextEvents(socket, "TRANSLATION_FINAL");\n'
              '    const errorPromise = nextEvents(socket, "TTS_ERROR");',
              '    const socket = await createAndOpenStream(\n'
              '      running.baseUrl,\n'
              '      "failing-tts"\n'
              '    );\n'
              '    const translationPromise = nextEvents(socket, "TRANSLATION_FINAL");\n'
              '    const errorPromise = nextEvents(socket, "TTS_ERROR");'
          )
          tests = tests.replace(
              '  assert.equal(requestBody?.generationConfig?.responseModalities?.[0], "AUDIO");\n'
              '  assert.equal(\n'
              '    requestBody?.generationConfig?.speechConfig?.voiceConfig\n'
              '      ?.prebuiltVoiceConfig?.voiceName,\n'
              '    "Iapetus"\n'
              '  );',
              '  const sentBody = requestBody as Record<string, any>;\n'
              '  assert.equal(\n'
              '    sentBody.generationConfig.responseModalities[0],\n'
              '    "AUDIO"\n'
              '  );\n'
              '  assert.equal(\n'
              '    sentBody.generationConfig.speechConfig.voiceConfig\n'
              '      .prebuiltVoiceConfig.voiceName,\n'
              '    "Iapetus"\n'
              '  );'
          )
          tests = tests.replace(
              '    const [translation] = await translationPromise;\n'
              '    const [audioStart] = await startPromise;\n'
              '    const chunks = await chunksPromise;\n'
              '    const [audioEnd] = await endPromise;',
              '    const translation = (await translationPromise)[0]!;\n'
              '    const audioStart = (await startPromise)[0]!;\n'
              '    const chunks = await chunksPromise;\n'
              '    const audioEnd = (await endPromise)[0]!;'
          )
          tests = tests.replace('chunks[0].data.chunk_index', 'chunks[0]!.data.chunk_index')
          tests = tests.replace('chunks[1].data.chunk_index', 'chunks[1]!.data.chunk_index')
          tests = tests.replace(
              '    const [completed] = await completedPromise;',
              '    const completed = (await completedPromise)[0]!;'
          )
          tests = tests.replace(
              '    const [translation] = await translationPromise;\n'
              '    const [error] = await errorPromise;',
              '    const translation = (await translationPromise)[0]!;\n'
              '    const error = (await errorPromise)[0]!;'
          )
          test_path.write_text(tests, encoding='utf-8', newline='\n')

          final_workflow = Path('/tmp/validate-main.yml')
          PY

          git show origin/main:.github/workflows/validate.yml > /tmp/validate-main.yml
          sed -i 's/0\.5\.0/0.6.0/g' /tmp/validate-main.yml
          cp /tmp/validate-main.yml .github/workflows/validate.yml
      - name: Validate implementation
        run: |
          cd src/cloud
          npm ci
          npm run check
          cd ../..
          node --check src/browser_extension/audio_processor.js
          node --check src/browser_extension/offscreen.js
          node --check src/browser_extension/popup.js
          node --check src/browser_extension/service_worker.js
          node -e "JSON.parse(require('fs').readFileSync('src/browser_extension/manifest.json', 'utf8'))"
      - name: Commit validated fixes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Validate Milestone 6 TTS and playback implementation"
          git push origin HEAD:agent/milestone-6-tts-playback

  cloud:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/cloud
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: src/cloud/package-lock.json
      - name: Install cloud dependencies
        run: npm ci
      - name: Build and test cloud service
        run: |
          set +e
          npm run check > validation.log 2>&1
          status=$?
          cat validation.log
          exit $status
      - name: Upload cloud validation log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: cloud-validation-log
          path: src/cloud/validation.log
          if-no-files-found: error

  browser-extension:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: "24"
      - name: Validate browser JavaScript
        run: |
          node --check src/browser_extension/audio_processor.js
          node --check src/browser_extension/offscreen.js
          node --check src/browser_extension/popup.js
          node --check src/browser_extension/service_worker.js
      - name: Validate browser manifest
        run: node -e "JSON.parse(require('fs').readFileSync('src/browser_extension/manifest.json', 'utf8'))"
      - name: Package browser extension 0.6.0
        run: |
          rm -rf dist
          mkdir -p dist/extension
          cp src/browser_extension/audio_processor.js dist/extension/
          cp src/browser_extension/manifest.json dist/extension/
          cp src/browser_extension/offscreen.html dist/extension/
          cp src/browser_extension/offscreen.js dist/extension/
          cp src/browser_extension/popup.css dist/extension/
          cp src/browser_extension/popup.html dist/extension/
          cp src/browser_extension/popup.js dist/extension/
          cp src/browser_extension/service_worker.js dist/extension/
          cp src/browser_extension/README.md dist/extension/
          cd dist
          zip -r VoiceBridge_Extension_0.6.0.zip extension
          sha256sum VoiceBridge_Extension_0.6.0.zip > VoiceBridge_Extension_0.6.0_SHA256.txt
      - name: Upload browser extension 0.6.0
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: VoiceBridge_Extension_0.6.0
          path: |
            dist/VoiceBridge_Extension_0.6.0.zip
            dist/VoiceBridge_Extension_0.6.0_SHA256.txt
          if-no-files-found: error

  repository-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
      - name: Validate Markdown ASCII
        run: |
          python3 - <<'PY'
          from pathlib import Path
          failures = []
          for path in Path('.').rglob('*.md'):
              try:
                  path.read_text(encoding='ascii')
              except UnicodeDecodeError:
                  failures.append(str(path))
          if failures:
              raise SystemExit('Non-ASCII Markdown: ' + ', '.join(failures))
          print('ASCII Markdown validation passed')
          PY
