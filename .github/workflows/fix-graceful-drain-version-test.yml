name: Fix graceful drain version test

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'agent/graceful-translation-drain'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
        with:
          ref: agent/graceful-translation-drain
      - name: Update cloud version assertion
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('src/cloud/tests/cloud.test.ts')
          text = path.read_text(encoding='utf-8')
          old_name = 'test("health reports cloud 0.4.0 and translation capability", async () => {'
          new_name = 'test("health reports cloud 0.4.1 and translation capability", async () => {'
          old_assertion = '  assert.equal(body.version, "0.4.0");'
          new_assertion = '  assert.equal(body.version, "0.4.1");'
          if old_name not in text or old_assertion not in text:
              raise SystemExit('Expected version-test patterns were not found')
          text = text.replace(old_name, new_name, 1)
          text = text.replace(old_assertion, new_assertion, 1)
          path.write_text(text, encoding='utf-8')
          Path('.github/workflows/fix-graceful-drain-version-test.yml').unlink()
          PY
      - name: Commit fix
        run: |
          git config user.name "VoiceBridge Automation"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Update cloud 0.4.1 validation assertion"
          git push origin HEAD:agent/graceful-translation-drain
