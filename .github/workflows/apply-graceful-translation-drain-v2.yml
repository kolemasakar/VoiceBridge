name: Apply graceful translation drain v2

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'agent/graceful-translation-drain'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
        with:
          ref: agent/graceful-translation-drain
      - name: Execute corrected patch script
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import textwrap

          old_workflow = Path('.github/workflows/apply-graceful-translation-drain.yml')
          workflow_text = old_workflow.read_text(encoding='utf-8')
          workflow_text = workflow_text.replace(
              "              '- cancellation on Stop and disconnect;\\n',\n"
              "              '- graceful drain of already accepted translations for up to 3000 milliseconds on Stop;\\n'\n"
              "              '- cancellation after drain timeout or unexpected disconnect;\\n'\n",
              "              '- ordered bounded per-session translation queue;\\n',\n"
              "              '- ordered bounded per-session translation queue;\\n'\n"
              "              '- graceful drain of already accepted translations for up to 3000 milliseconds on Stop;\\n'\n"
              "              '- cancellation after drain timeout or unexpected disconnect;\\n'\n"
          )
          marker = "          python3 - <<'PY'\n"
          end_marker = "\n          PY\n"
          if marker not in workflow_text or end_marker not in workflow_text:
              raise SystemExit('Unable to locate embedded patch script')
          embedded = workflow_text.split(marker, 1)[1].split(end_marker, 1)[0]
          script = textwrap.dedent(embedded)
          exec(compile(script, 'graceful-drain-patch.py', 'exec'), {})
          Path('.github/workflows/apply-graceful-translation-drain-v2.yml').unlink()
          PY
      - name: Commit patch
        run: |
          git config user.name "VoiceBridge Automation"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Add graceful translation drain on stream stop"
          git push origin HEAD:agent/graceful-translation-drain
