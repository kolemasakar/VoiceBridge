name: Apply translation drain 10s

on:
  push:
    branches:
      - agent/graceful-drain-10s

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
        with:
          ref: agent/graceful-drain-10s
      - name: Apply cloud 0.4.2 patch
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              if text.count(old) != 1:
                  raise SystemExit(f'{path}: expected one occurrence of {old!r}, found {text.count(old)}')
              p.write_text(text.replace(old, new), encoding='utf-8', newline='\n')

          replace_once(
              'src/cloud/src/stream_transport.ts',
              'const TRANSLATION_DRAIN_TIMEOUT_MS = 3000;',
              'const TRANSLATION_DRAIN_TIMEOUT_MS = 10000;'
          )
          replace_once(
              'src/cloud/src/server.ts',
              'const SERVICE_VERSION = "0.4.1";',
              'const SERVICE_VERSION = "0.4.2";'
          )

          package_path = Path('src/cloud/package.json')
          package = json.loads(package_path.read_text(encoding='utf-8'))
          if package.get('version') != '0.4.1':
              raise SystemExit('Unexpected package.json version')
          package['version'] = '0.4.2'
          package_path.write_text(json.dumps(package, indent=2) + '\n', encoding='utf-8')

          lock_path = Path('src/cloud/package-lock.json')
          lock = json.loads(lock_path.read_text(encoding='utf-8'))
          if lock.get('version') != '0.4.1' or lock['packages'][''].get('version') != '0.4.1':
              raise SystemExit('Unexpected package-lock.json version')
          lock['version'] = '0.4.2'
          lock['packages']['']['version'] = '0.4.2'
          lock_path.write_text(json.dumps(lock, indent=2) + '\n', encoding='utf-8')

          test_path = Path('src/cloud/tests/cloud.test.ts')
          tests = test_path.read_text(encoding='utf-8')
          tests = tests.replace(
              '  count = 1\n): Promise<Array<Record<string, any>>> {',
              '  count = 1,\n  timeoutMs = 5000\n): Promise<Array<Record<string, any>>> {'
          )
          tests = tests.replace(
              '    }, 5000);',
              '    }, timeoutMs);',
              1
          )
          tests = tests.replace(
              '  expectedType: string\n): Promise<Record<string, any>> {\n  return (await nextSocketEvents(socket, expectedType, 1))[0]!;',
              '  expectedType: string,\n  timeoutMs = 5000\n): Promise<Record<string, any>> {\n  return (await nextSocketEvents(socket, expectedType, 1, timeoutMs))[0]!;'
          )
          tests = tests.replace(
              'async function stopStream(socket: WebSocket): Promise<Record<string, any>> {\n  const completedPromise = nextSocketEvent(socket, "STREAM_COMPLETED");',
              'async function stopStream(\n  socket: WebSocket,\n  timeoutMs = 5000\n): Promise<Record<string, any>> {\n  const completedPromise = nextSocketEvent(\n    socket,\n    "STREAM_COMPLETED",\n    timeoutMs\n  );'
          )
          tests = tests.replace('assert.equal(body.version, "0.4.1");', 'assert.equal(body.version, "0.4.2");')

          start = tests.index('test("stream stop drains accepted translations before completion"')
          end = tests.index('test("translation queue rejects work above twenty pending segments"', start)
          replacement = '''test("stream stop drains a queue longer than three seconds", async () => {
  const running = await startServer(
    new ScriptedSttProvider("drain-stt", true),
    new DelayedTranslationProvider(600)
  );

  try {
    const sessionId = await createActiveSession(running.baseUrl);
    const { socket } = await openStream(running.baseUrl, sessionId);
    const transcriptsPromise = nextSocketEvents(
      socket,
      "TRANSCRIPT_FINAL",
      6
    );
    const translationsPromise = nextSocketEvents(
      socket,
      "TRANSLATION_FINAL",
      6,
      7000
    );

    for (let index = 0; index < 6; index += 1) {
      socket.send(Buffer.alloc(1920));
    }
    const transcripts = await transcriptsPromise;
    const completedPromise = stopStream(socket, 7000);
    const translations = await translationsPromise;
    const completed = await completedPromise;

    assert.deepEqual(
      translations.map((event) => event.data.segment_id),
      transcripts.map((event) => event.data.segment_id)
    );
    assert.equal(completed.data.final_transcripts, 6);
    assert.equal(completed.data.final_translations, 6);
    assert.equal(completed.data.translation_errors, 0);
    assert.ok(completed.data.translation_pending_at_stop >= 1);
    assert.equal(completed.data.translation_drain_timed_out, false);
  } finally {
    await closeServer(running.server);
  }
});

'''
          tests = tests[:start] + replacement + tests[end:]
          tests = tests.replace(
              'const completed = await stopStream(socket);\n    assert.equal(completed.data.final_transcripts, 21);',
              'const completed = await stopStream(socket, 12000);\n    assert.equal(completed.data.final_transcripts, 21);'
          )
          required = [
              'timeoutMs = 5000',
              'assert.equal(body.version, "0.4.2");',
              'new DelayedTranslationProvider(600)',
              'stopStream(socket, 12000)'
          ]
          for marker in required:
              if marker not in tests:
                  raise SystemExit(f'Missing test marker: {marker}')
          test_path.write_text(tests, encoding='utf-8', newline='\n')

          for path in [
              'src/cloud/README.md',
              'docs/phases/PHASE_1_MILESTONE_5_TRANSLATION_INTEGRATION.md',
              'README.md',
              'docs/planning/03_ROADMAP.md'
          ]:
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              text = text.replace('cloud service `0.4.1`', 'cloud service `0.4.2`')
              text = text.replace('Version:\n0.4.1', 'Version:\n0.4.2')
              text = text.replace('3000 milliseconds', '10000 milliseconds')
              text = text.replace('three-second', 'ten-second')
              p.write_text(text, encoding='utf-8', newline='\n')

          history = Path('docs/history/PHASE_1_MILESTONE_5_DRAIN_TIMEOUT_ADJUSTMENT.md')
          history.write_text('''# Phase 1 Milestone 5 Drain Timeout Adjustment

Date: 2026-07-21

Status: IMPLEMENTED; CONTROLLED LIVE TEST PENDING

## Trigger

The second live Gemini validation used cloud service `0.4.1`. During active operation the counters were equal at 15 English and 15 Ukrainian final segments. After Stop the counters were 32 English and 26 Ukrainian final segments, with zero dropped audio frames.

The six-segment translation backlog required approximately 3.8 seconds at the observed average Gemini latency of 627 milliseconds. The existing 3000-millisecond drain limit could therefore expire before the accepted queue completed.

## Resolution

Cloud service `0.4.2` increases the bounded translation drain limit from 3000 to 10000 milliseconds.

The sequential ordering, segment identity, maximum queue size, provider timeout, immediate disconnect cancellation, and no-persistence policy remain unchanged.

## Automated Validation

The graceful-drain test now reproduces six sequential translations at 600 milliseconds each. The queue requires more than three seconds and must complete before `STREAM_COMPLETED` under the new ten-second bound.

The blocked-provider test remains bounded and verifies cancellation after the ten-second drain timeout.

## Versions

- cloud service: `0.4.2`;
- browser extension: `0.5.0` unchanged.

## Next Step

Deploy cloud service `0.4.2` and repeat a one-to-two-minute live test. After Stop, final English and Ukrainian segment counts should match when the accepted queue completes within ten seconds.
''', encoding='ascii', newline='\n')

          Path('.github/workflows/apply-drain-10s.yml').unlink()
          PY
      - name: Validate cloud service
        working-directory: src/cloud
        run: |
          npm ci
          npm run check
      - name: Commit patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Extend graceful translation drain to ten seconds"
          git push origin HEAD:agent/graceful-drain-10s
